version: "3.8"

# ============================================================
# Bradix — One-Click Docker Stack
# The Quiet Guardian: all services run silently in the background.
# Access n8n at http://localhost:5678
# ============================================================

services:

  # ─────────────────────────────────────────────
  # n8n — Workflow Orchestration Engine
  # The brain of the Quiet Guardian.
  # ─────────────────────────────────────────────
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: bradix-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=${N8N_HOST:-0.0.0.0}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-andrew}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/}
      - GENERIC_TIMEZONE=Australia/Brisbane
      - TZ=Australia/Brisbane
      # Database
      - DB_TYPE=${DB_TYPE:-postgresdb}
      - DB_POSTGRESDB_HOST=${DB_POSTGRESDB_HOST:-postgres}
      - DB_POSTGRESDB_PORT=${DB_POSTGRESDB_PORT:-5432}
      - DB_POSTGRESDB_DATABASE=${DB_POSTGRESDB_DATABASE:-n8n}
      - DB_POSTGRESDB_USER=${DB_POSTGRESDB_USER:-bradix}
      - DB_POSTGRESDB_PASSWORD=${DB_POSTGRESDB_PASSWORD:-${POSTGRES_PASSWORD}}
      # Email (SMTP)
      - N8N_EMAIL_MODE=smtp
      - N8N_SMTP_HOST=${SMTP_HOST}
      - N8N_SMTP_PORT=${SMTP_PORT:-587}
      - N8N_SMTP_USER=${SMTP_USER}
      - N8N_SMTP_PASS=${SMTP_PASS}
      - N8N_SMTP_SENDER=${SMTP_SENDER}
      # Jetson endpoint (available in workflows as $env.JETSON_ENDPOINT)
      - JETSON_ENDPOINT=${JETSON_ENDPOINT:-http://jetson.local:8000}
      # Alert emails
      - ALERT_EMAIL_PRIMARY=${ALERT_EMAIL_PRIMARY:-bts@outlook.com}
      - ALERT_EMAIL_SECONDARY=${ALERT_EMAIL_SECONDARY:-cherylbruder@icloud.com}
      # Privacy — no telemetry
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
    volumes:
      - n8n_data:/home/node/.n8n
      - ${CASE_DATA_PATH:-/opt/bradix/case-data}:/case-data:ro
      - ${WORKFLOWS_PATH:-/opt/bradix/one-click-install/workflows}:/workflows:ro
    networks:
      - bradix-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5678/healthz"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────
  # PostgreSQL — n8n Database
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: bradix-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-bradix}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-n8n}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bradix-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bradix}"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ─────────────────────────────────────────────
  # Watchtower — Auto-update containers
  # Keeps the system current without manual effort.
  # ─────────────────────────────────────────────
  watchtower:
    image: containrrr/watchtower
    container_name: bradix-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_SCHEDULE=0 0 3 * * SUN
      - WATCHTOWER_NOTIFICATIONS=off
      - TZ=Australia/Brisbane
    networks:
      - bradix-net

volumes:
  n8n_data:
    name: bradix_n8n_data
  postgres_data:
    name: bradix_postgres_data

networks:
  bradix-net:
    name: bradix_network
    driver: bridge
